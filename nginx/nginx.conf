server {
    listen 80;
    server_name localhost;

    # 공통: 헤더 설정
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # 1. 과업지시서 분선 (메인 대시보드 역할 담당)
    location / {
        proxy_pass http://dashboard-service:3000;
        
        # 웹소켓(HMR) 지원
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 2. 법규분석 모듈 
    # 사용자가 http://localhost/regulation 접속 시 해당 컨테이너로 리버스 프록시
    location /regulation {
        proxy_pass http://regulation-service:3000;
        
        # URI 재작성: /regulation/foo -> /foo 로 전달해야한다면 아래 구문 사용 (선택 사항)
        # rewrite ^/regulation(.*)$ $1 break;
    }

    # 3. 대지분석 모듈
    location /site-analysis {
        proxy_pass http://site-analysis-service:3000;
    }

    # 4. 3D 매스 모델링 모듈 (가장 무거운 컨테이너)
    location /3dmass {
        proxy_pass http://3dmass-service:3000;
    }

    # [번외] 하위/기존 모듈로 연결 (프론트엔드 모놀리식 서버 포워딩)
    location /legacy {
        proxy_pass http://legacy-frontend:3000;
    }
}
