version: '3.8'

# ============================================================
# FLEXITY AI Architecture Platform - Docker Compose
# 현재 활성: frontend (Webpack), gis-service (FastAPI)
# 추후 추가: regulation-engine, optimization-engine, financial-analyzer
# ============================================================

services:
  # ─── Frontend (Webpack + React + Three.js) ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src           # HMR - 소스 코드 변경 즉시 반영
      - ./frontend/index.html:/app/index.html
      - /app/node_modules                 # node_modules는 컨테이너 내부 것 사용
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true          # Docker 내 파일 감지 (Windows 호환)
    depends_on:
      - gis-service
    networks:
      - flexity-net

  # ─── GIS Service (지적도/주소 - FastAPI) ───
  gis-service:
    build:
      context: ./services/gis-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - VWORLD_API_KEY=${VWORLD_API_KEY}
      - KAKAO_REST_KEY=${KAKAO_REST_KEY}
    volumes:
      - ./services/gis-service:/app       # 소스 핫 리로드
    networks:
      - flexity-net

  # ─── [예정] Regulation Engine (건축 법규 계산) ───
  # regulation-engine:
  #   build:
  #     context: ./services/regulation-engine
  #     dockerfile: Dockerfile
  #   ports:
  #     - "8002:8002"
  #   networks:
  #     - flexity-net

  # ─── [예정] Optimization Engine (매스/볼륨 최적화) ───
  # optimization-engine:
  #   build:
  #     context: ./services/optimization-engine
  #     dockerfile: Dockerfile
  #   ports:
  #     - "8003:8003"
  #   networks:
  #     - flexity-net

  # ─── [예정] Financial Analyzer (사업성 분석) ───
  # financial-analyzer:
  #   build:
  #     context: ./services/financial-analyzer
  #     dockerfile: Dockerfile
  #   ports:
  #     - "8004:8004"
  #   networks:
  #     - flexity-net

networks:
  flexity-net:
    driver: bridge
